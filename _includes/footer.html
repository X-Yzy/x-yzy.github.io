<footer
  aria-label="Site Info"
  class="d-flex justify-content-end text-muted pb-lg-3"
>
  <p class="text-end" style="width: 100%; text-align: right !important">
    © <time>{{ 'now' | date: '%Y' }}</time>
    {% if site.social.links %}
      <a href="{{ site.social.links[0] }}">{{ site.social.name }}</a>
    {% else %}
      <span>{{ site.social.name }}</span>
    {% endif %}
  </p>
</footer>
